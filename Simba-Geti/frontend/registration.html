<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCA - Beneficiary Registration</title>
  <link rel="stylesheet" href="css/registration.css" />
</head>
<body>
  <div class="page-wrapper">

    <div class="left-panel">
      <div class="logo-circle">
        <div class="fca-badge"><span>
          <img src="image.png" alt="FCA Logo" />
        </span></div>
      </div>
      <h2 class="program-title">Refugee Support Program</h2>
    </div>

    <div class="right-panel">
      <h1 class="form-heading">Beneficiary Registration Form</h1>

      <div class="success-alert" id="successAlert" style="display:none;">
        <span>Beneficiary registered successfully</span>
        <button class="close-alert" id="closeAlert">&#x2715;</button>
      </div>

      <div class="form-grid" id="regForm">

        <div class="form-group">
          <label for="firstName">First Name <span class="req">*</span></label>
          <input type="text" id="firstName" placeholder="Enter your First name" />
          <span class="error-msg" id="firstNameErr"></span>
        </div>

        <div class="form-group">
          <label for="lastName">Last name <span class="req">*</span></label>
          <input type="text" id="lastName" placeholder="Enter your Last name" />
          <span class="error-msg" id="lastNameErr"></span>
        </div>

        <div class="form-group">
          <label for="dateOfBirth">Date of birth <span class="req">*</span></label>
          <input type="text" id="dateOfBirth" placeholder="YYYY / MM / DD" maxlength="14" />
          <span class="error-msg" id="dateOfBirthErr"></span>
        </div>

        <div class="form-group">
          <label for="placeOfBirth">Place of Birth <span class="req">*</span></label>
          <input type="text" id="placeOfBirth" placeholder="Enter your place of residence" />
          <span class="error-msg" id="placeOfBirthErr"></span>
        </div>

        <div class="form-group full-width">
          <label>Gender</label>
          <div class="gender-box">
            <label class="gender-option">
              <input type="radio" name="gender" value="Male" id="genderMale" />
              <span class="radio-custom"><span class="dot"></span></span>
              <span>Male</span>
            </label>
            <label class="gender-option">
              <input type="radio" name="gender" value="Female" id="genderFemale" checked />
              <span class="radio-custom"><span class="dot"></span></span>
              <span>Female</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="nationality">Nationality <span class="req">*</span></label>
          <div class="select-wrapper">
            <select id="nationality">
              <option value="" disabled selected>-- Select Nationality --</option>
              <option value="Ugandan">Ugandan</option>
              <option value="Kenyan">Kenyan</option>
              <option value="Tanzanian">Tanzanian</option>
              <option value="Burundian">Burundian</option>
              <option value="Rwandese">Rwandese</option>
              <option value="Somali">Somali</option>
              <option value="South Sudanese">South Sudanese</option>
            </select>
            <span class="select-arrow">&#9660;</span>
          </div>
          <span class="error-msg" id="nationalityErr"></span>
        </div>

        <div class="form-group">
          <label for="maritalStatus">Marital status <span class="req">*</span></label>
          <div class="select-wrapper">
            <select id="maritalStatus">
              <option value="" disabled selected>-- Select Marital status --</option>
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Divorced">Divorced</option>
              <option value="Widowed">Widowed</option>
              <option value="Separated">Separated</option>
            </select>
            <span class="select-arrow">&#9660;</span>
          </div>
          <span class="error-msg" id="maritalStatusErr"></span>
        </div>

        <div class="form-group">
          <label for="settlementCamp">Settlement camp <span class="req">*</span></label>
          <div class="select-wrapper">
            <select id="settlementCamp">
              <option value="" disabled selected>-- Select settlement camp --</option>
              <option value="Gulu settlement camp">Gulu settlement camp</option>
              <option value="Arua settlement camp">Arua settlement camp</option>
              <option value="Mbarara settlement camp">Mbarara settlement camp</option>
              <option value="Kasese settlement camp">Kasese settlement camp</option>
              <option value="Busia settlement camp">Busia settlement camp</option>
              <option value="Mbale settlement camp">Mbale settlement camp</option>
              <option value="Kigezi settlement camp">Kigezi settlement camp</option>
            </select>
            <span class="select-arrow">&#9660;</span>
          </div>
          <span class="error-msg" id="settlementCampErr"></span>
        </div>

        <div class="form-group">
          <label for="dateOfJoiningCamp">Date of joining Settlement camp <span class="req">*</span></label>
          <input type="text" id="dateOfJoiningCamp" placeholder="YYYY / MM / DD" maxlength="14" />
          <span class="error-msg" id="dateOfJoiningCampErr"></span>
        </div>

        <button class="btn-register-form" id="registerBtn">Register</button>

      </div>
    </div>
  </div>

  <script src="js/registration.js"></script>
</body>
</html>
