<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refugee Support Program</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   <link rel="stylesheet" href="./index.css">
</head>
<body>
  <main class="container-fluid px-0">
    <div class="row g-0 min-vh-100"> 
      <section class="col-12 col-lg-5 left-panel d-flex flex-column justify-content-center align-items-center text-center p-4 p-lg-5">  
        <img src="./fca-logo.jpg" alt="FCA logo" class="left-logo mb-1">
        <p class=" fs-4 fw-semibold mb-3 text-white">Refugee Support Program</p>
      </section>

      <section class="col-12 col-lg-7 right-panel p-4 p-lg-5">
        <div class="form-wrap mx-auto">
          <h1 class="form-heading text-center mb-4">BENEFICIARY REGISTRATION FORM</h1>

          <form>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="firstName" class="form-label field-label " required>First Name <span class="required-mark">*</span></label>
                <input id="firstName" type="text" class="form-control field-control" placeholder="Enter your First name" required minlength="2" class="field-error">
              </div>

              <div class="col-12 col-md-6">
                <label for="lastName" class="form-label field-label">Last name <span class="required-mark">*</span></label>
                <input id="lastName" type="text" class="form-control field-control" placeholder="Enter your Last name" required minlength="2" class="field-error">
              </div>

              <div class="col-12 col-md-6">
                <label for="dob" class="form-label field-label">Date of birth <span class="required-mark">*</span></label>
                <input id="dob" type="text" class="form-control field-control" placeholder="YYYY / MM / DD" class="field-error">
              </div>

              <div class="col-12 col-md-6">
                <label for="placeOfBirth" class="form-label field-label">Place of Birth <span class="required-mark">*</span></label>
                <input id="placeOfBirth" type="text" class="form-control field-control" placeholder="Enter your place of residence" required minlength="2" class="field-error">
              </div>

              <div class="col-12">
                <label class="form-label field-label">Gender</label>
                <div class="field-control gender-box d-flex align-items-center justify-content-around ">
                  <div class="form-check m-0">
                    <input class="form-check-input gender-radio" type="radio" name="gender" id="male" value="male" class="field-error">
                    <label class="form-check-label gender-label" for="male">Male</label>
                  </div>
                  <div class="form-check m-0">
                    <input class="form-check-input gender-radio" type="radio" name="gender" id="female" value="female" checked class="field-error">
                    <label class="form-check-label gender-label" for="female">Female</label>
                  </div>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <label for="nationality" class="form-label field-label">Nationality <span class="required-mark">*</span></label>
                <select id="nationality" class="form-select field-control">
                  <option selected>-- Select Nationality --</option>
                  <option>Ugandan</option>
                  <option>Kenyan</option>
                  <option>Tanzanian</option>
                  <option>Burundian</option>
                  <option>Rwandese</option>
                  <option>Somali</option>
                  <option>South Sudanese</option>
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="maritalStatus" class="form-label field-label">Marital status <span class="required-mark">*</span></label>
                <select id="maritalStatus" class="form-select field-control">
                  <option selected>-- Select Marital status --</option>
                  <option>Single</option>
                  <option>Married</option>
                  <option>Divorced</option>
                  <option>Widowed</option>
                  <option>Separated</option>
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="settlementCamp" class="form-label field-label">Settlement camp <span class="required-mark">*</span></label>
                <select id="settlementCamp" class="form-select field-control">
                  <option selected>-- Select settlement camp --</option>
                  <option>Gulu settlement camp</option>
                  <option>Arua settlement camp</option>
                  <option>Mbarara settlement camp</option>
                  <option>Kasese settlement camp</option>
                  <option>Busia settlement camp</option>
                  <option>Mbale settlement camp</option>
                  <option>Kigezi settlement camp</option>
                </select>
              </div>

              <div class="col-12 col-md-6">
                <label for="joinDate" class="form-label field-label">Date of joining Settlement camp <span class="required-mark">*</span></label>
                <input id="joinDate" type="text" class="form-control field-control" placeholder="YYYY / MM / DD" class="field-error">
              </div>

              <div class="col-12 pt-2 d-flex justify-content-end"> 
                <button type="submit" class="btn submit-btn" >Register</button>
              </div>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>
      

      <script>
        // lets connect this to the bcakend with fetch api
        const form = document.querySelector('form');  
        form.addEventListener('submit', async (e) => {
          e.preventDefault();

          const formData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            dob: document.getElementById('dob').value,
            placeOfBirth: document.getElementById('placeOfBirth').value,
            gender: document.querySelector('input[name="gender"]:checked').value,
            nationality: document.getElementById('nationality').value,
            maritalStatus: document.getElementById('maritalStatus').value,
            settlementCamp: document.getElementById('settlementCamp').value,
            joinDate: document.getElementById('joinDate').value
          };

          if (!formData.firstName || !formData.lastName || !formData.dob || !formData.placeOfBirth || !formData.nationality || !formData.maritalStatus || !formData.settlementCamp || !formData.joinDate) {
            fieldError = true;
            return;
          }else if (formData.nationality === '-- Select Nationality --' || formData.maritalStatus === '-- Select Marital status --' || formData.settlementCamp === '-- Select settlement camp --') {
            fieldError = true;
            return;
          }else (formData.firstName.length < 2 || formData.lastName.length < 2 || formData.placeOfBirth.length < 2) {
            fieldError = true;
            return;
          }
          


          try {
            const response = await fetch('/api/users', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(formData)
            });

            if (response.ok) {
              const result = await response.json();
              console.log('beneficiary registered successfully:', result);
              // show success message
            } else {
              const error = await response.json();
              console.error('Error registering user:', error);
              // Show error message
            }
          } catch (error) {
            console.error('Error submitting form:', error);
            // Show error message
          }
        });
        

        

        

      </script>
</body>
</html>
