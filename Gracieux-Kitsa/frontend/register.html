<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="reg-container">
    <div class="reg-content">
      <div class="content-1">
        <img src="assets/logo/fca-logo.jpg" alt="logo" />
        <span class="landing-text">Refugee Support Program</span>
      </div>
      
     
      <div class="content-2">
        <h2 class="form-title"></h2>
        <p class="form-subtitle">
          BENEFICIARY REGISTRATION FORM
        </p>
        <div id="successAlert" class="alert success hidden">
          <span>Registration successful</span>
          <button id="closeAlert" type="button" class="alert-close">Close</button>
        </div>

       <form class="reg-form" id="regForm">
            <div class="form-group">
                <label class="form-label">First name *</label>
                <input
                type="text"
                id="fname"
                class="form-control"
                placeholder="Enter your First Name"
                />
                <small class="error-msg" id="fnameError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Last name *</label>
                <input
                type="text"
                id="lname"
                class="form-control"
                placeholder="Enter your Last Name"
                />
                <small class="error-msg" id="lnameError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Date of Birth *</label>
                <input type="date" id="dateofbirth" class="form-control" />
                <small class="error-msg" id="dateofbirthError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Place of Birth *</label>
                <input type="text" id="pofbirth" class="form-control" />
                <small class="error-msg" id="pofbirthError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Gender *</label>
                <input type="radio" name="gender" value="Male" /> Male
                <input type="radio" name="gender" value="Female" checked /> Female

                <small class="error-msg" id="genderError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Nationality *</label>

                <select id="nationality" class="form-control">
                <option value="">-- Select Nationality --</option>
                <option value="Ugandan">Ugandan</option>
                <option value="Kenyan">Kenyan</option>
                <option value="Tanzanian">Tanzanian</option>
                <option value="Burundian">Burundian</option>
                <option value="Rwandese">Rwandese</option>
                <option value="Somali">Somali</option>
                <option value="South Sudanese">South Sudanese</option>
                </select>

                <small class="error-msg" id="nationalityError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Marital Status *</label>

                <select id="maritalstatus" class="form-control">
                <option value="">-- Select Status --</option>
                <option value="Single">Single</option>
                <option value="Married">Married</option>
                <option value="Divorced">Divorced</option>
                <option value="Widowed">Widowed</option>
                <option value="Separated">Separated</option>
                </select>

                <small class="error-msg" id="maritalstatusError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Settlement Camp *</label>

                <select id="settlement" class="form-control">
                <option value="">-- Select Camp --</option>
                <option value="Gulu">Gulu Settlement Camp</option>
                <option value="Arua">Arua Settlement Camp</option>
                <option value="Mbarara">Mbarara Settlement Camp</option>
                <option value="Kasese">Kasese Settlement Camp</option>
                <option value="Busia">Busia Settlement Camp</option>
                <option value="Mbale">Mbale Settlement Camp</option>
                <option value="Kigezi">Kigezi Settlement Camp</option>
                </select>

                <small class="error-msg" id="settlementError"></small>
            </div>

            <div class="form-group">
                <label class="form-label">Date of Joining *</label>
                <input type="date" id="dateofjoining" class="form-control" />
                <small class="error-msg" id="dateofjoiningError"></small>
            </div>

            <button type="submit" class="register-btn">Register</button>
            </form>

      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
