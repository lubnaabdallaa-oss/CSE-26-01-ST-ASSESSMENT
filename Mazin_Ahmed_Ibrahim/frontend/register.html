<!DOCTYPE html>
<html>

<head><meta charset="utf-8">

<title>Beneficiary Registration</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="left-panel">

<img src="images/fca-logo.jpg" alt="FCA Logo" class="logo-circle">

<h2>Refugee Support Program</h2>

</div>

<div class="right-panel">

<h1 class="form-title">BENEFICIARY REGISTRATION FORM</h1>

<div id="globalError" class="global-error">
Oops! There are required field(s) that are not filled out
</div>

<div id="successMessage" class="success">
Beneficiary successfully registered
</div>

<form id="form">

<div class="grid">

<div class="form-group">
<label>First Name <span class="required">*</span></label>
<input type="text" id="firstName">
<small class="error-message"></small>
</div>

<div class="form-group">
<label>Last Name <span class="required">*</span></label>
<input type="text" id="lastName">
<small class="error-message"></small>
</div>

<div class="form-group">
<label>Date of Birth <span class="required">*</span></label>
<input type="date" id="dob">
<small class="error-message"></small>
</div>

<div class="form-group">
<label>Place of Birth <span class="required">*</span></label>
<input type="text" id="placeOfBirth">
<small class="error-message"></small>
</div>

</div>

<div class="form-group gender-group">

<label>Gender</label>

<div class="gender-options">

<label>
<input type="radio" name="gender" value="Male">
Male
</label>

<label>
<input type="radio" name="gender" value="Female" checked>
Female
</label>

</div>

</div>

<div class="grid">

<div class="form-group">
<label>Nationality <span class="required">*</span></label>

<select id="nationality">

<option value="">-- Select Nationality --</option>
<option>Ugandan</option>
<option>Kenyan</option>
<option>Tanzanian</option>
<option>Burundian</option>
<option>Rwandese</option>
<option>Somali</option>
<option>South Sudanese</option>

</select>

<small class="error-message"></small>

</div>

<div class="form-group">

<label>Marital Status <span class="required">*</span></label>

<select id="maritalStatus">

<option value="">-- Select Marital Status --</option>
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Widowed</option>
<option>Separated</option>

</select>

<small class="error-message"></small>

</div>

<div class="form-group">

<label>Settlement Camp <span class="required">*</span></label>

<select id="camp">

<option value="">-- Select settlement camp --</option>
<option>Gulu settlement camp</option>
<option>Arua settlement camp</option>
<option>Mbarara settlement camp</option>
<option>Kasese settlement camp</option>
<option>Busia settlement camp</option>
<option>Mbale settlement camp</option>
<option>Kigezi settlement camp</option>

</select>

<small class="error-message"></small>

</div>

<div class="form-group">

<label>Date of joining Settlement camp <span class="required">*</span></label>

<input type="date" id="joinDate">

<small class="error-message"></small>

</div>

</div>

<button type="submit" class="submit-btn">Register</button>

</form>

</div>

</div>

<script src="js/validation.js"></script>

</body>

</html>
