<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beneficiary Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LEFT: LOGO -->
  <div class="left-side">
    <div class="logo">
      <img src="/assessment/logo & colors/fca-logo.jpg" alt="Logo">
    </div>
    <h1>Welcome</h1>
  </div>
<!-- RIGHT: FORM -->
  <div class="right-side">
    <main>
      <form id="registrationForm" novalidate>

        <label for="firstName">First Name</label>
        <input type="text" id="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" required>

        <label for="placeOfBirth">Place of Birth</label>
        <input type="text" id="placeOfBirth" required>

        <label for="dateOfBirth">Date of Birth</label>
        <input type="date" id="dateOfBirth" required>

        <label for="registrationDate">Date of Registration</label>
        <input type="date" id="registrationDate" required>

        <label for="joinDate">Date of Joining Camp</label>
        <input type="date" id="joinDate" required>

        <p>Gender</p>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Female" required> Female</label>
          <label><input type="radio" name="gender" value="Male"> Male</label>
        </div>

        <label for="nationality">Nationality</label>
        <select id="nationality" required>
          <option value="">Select nationality</option>
          <option>Ugandan</option>
          <option>Kenyan</option>
        </select>

        <label for="maritalStatus">Marital Status</label>
        <select id="maritalStatus" required>
          <option value="">Select status</option>
          <option>Single</option>
          <option>Married</option>
        </select>

        <label for="settlementCamp">Settlement Camp</label>
        <select id="settlementCamp" required>
          <option value="">Select camp</option>
          <option>Gulu</option>
          <option>Arua</option>
        </select>

        <button type="submit">Save</button>

      </form>

    </main>
  </div>
</div>
  
</div>

<script src="index.js"></script>
</body>
</html>
