<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refugee Support Program</title>

    <!-- Bringing in the stylesheet to make things look proper -->
    <link rel="stylesheet" href="./css/index.css">

    <!-- The small icon that shows in the browser tab -->
    <link rel="icon" href="./assets/fca-logo.jpg">

    <!-- The original fonts refused to cooperate so we fetched alternatives from Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&display=swap"

<body>

    <!-- This wrapper centers everything on the landing page -->
    <div class="landing-wrapper">
        <div class="container">

            <!-- The organisation logo sitting at the top -->
            <div class="logo-container">
                <img src="./assets/fca-logo.jpg" alt="FCA Logo">
            </div>

            <!-- Main title that greets the user -->
            <h1 class="title">Refugee Support Program</h1>

            <!-- This button takes you straight to the registration form -->
            <button onclick="window.location.href='form.html'" class="register-btn">Register</button>
