<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCA - Refugee Support Program</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Teko:wght@400;500&display=swap" rel="stylesheet">

    <style>

/* Core Variables */
:root {
    --pale-green: #99CC32;
    --deep-green: #385723;
    --white: #ffffff;
}

body {
    background-color: var(--pale-green);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin: 0;
}

.landing-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

/* Logo styling */
.logo {
    width: 150px; 
    height: auto;
    border-radius: 100%;
}

.program-title {
    color: var(--white);
    font-family: 'Teko', sans-serif; 
    font-size: 2.8rem;
    margin-bottom: 40px;
    padding-top: 10px;
    font-size: 25px;
    letter-spacing: 1px;
}

/* Button styling*/
.register-btn {
    background-color: var(--white);
    color: var(--pale-green);
    font-family: 'Arial Narrow', sans-serif;
    font-size: 1.25rem;
    padding: 12px 70px;
    border: none;
    border-radius: 4px; 
    cursor: pointer;
    box-shadow: 5px 6px 5px rgba(0, 0, 0, 0.300);
    transition: all 0.3s ease;
}


.register-btn:hover {
    background-color: var(--deep-green);
    color: var(--white);
    box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.2);
    cursor: pointer;
}

    </style>
</head>
<body>
    <main class="landing-container">
        <img src="/Daniel-Akilimali/img/fca-logo.jpg" alt="FCA" class="logo">
        
        <h1 class="program-title">Refugee Support Program</h1>
        
        <button class="register-btn">Register</button>
    </main>

    <script>
    document.querySelector('.register-btn').addEventListener('click', function() {
        window.location.href = 'index.html'; 
    });
</script>
</body>
</html>
